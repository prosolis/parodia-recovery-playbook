# coturn for parodia.dev Matrix VoIP (voice/video calls).
# Hand-rolled; mirrors the etke coturn settings. Secrets and host-specific values
# (static-auth-secret, external-ip, realm) are injected as CLI overrides from the
# compose `command:` block so they stay OUT of this tracked file — see docker-compose.yml.
#
# Synapse must carry the SAME shared secret in homeserver.yaml `turn_shared_secret`.
# Firewall: open 3478 + 5349 (tcp & udp) and the 49152-49252/udp relay range.

listening-port=3478
tls-listening-port=5349
fingerprint
use-auth-secret
# realm / static-auth-secret / external-ip come from the compose command: overrides.

# Relay port range (matches etke: 100 ports). Must be open in the host firewall.
min-port=49152
max-port=49252

# Don't relay to loopback/private ranges — TURN should only reach public peers.
no-tcp-relay
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# Hardening / noise reduction.
no-cli
no-software-attribute
stale-nonce=600
no-multicast-peers
pidfile=/var/run/turnserver.pid

# --- TLS (turns:5349) — TODO before advertising turns: in Synapse ---------------
# coturn needs the matrix.parodia.dev cert+key. Wire mash-traefik's dumped certs
# (the traefik-certs-dumper pattern etke used) to a host path and mount it here, then:
#   cert=/etc/coturn/certs/cert.pem
#   pkey=/etc/coturn/certs/privkey.pem
# Until then, turn:3478 (unencrypted relay, still HMAC-authed) is advertised and works.
