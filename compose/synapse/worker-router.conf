# Synapse worker routing — Traefik (terminates TLS) -> this nginx -> workers / main.
# Trimmed from the official example; VALIDATE against your Synapse version on first deploy:
#   https://element-hq.github.io/synapse/latest/workers.html
# Sync is balanced across sync1/sync2 with consistent hashing on the access token so a
# given user sticks to one worker (cache locality).

upstream synapse_main  { server synapse:8008; }
upstream synapse_fed   { server fedreader:8008; }
upstream synapse_media { server mediaworker:8008; }
upstream synapse_sync  {
    hash $http_authorization consistent;
    server sync1:8008;
    server sync2:8008;
}

server {
    listen 80;
    server_name matrix.parodia.dev;
    client_max_body_size 50M;            # keep in sync with max_upload_size

    # TLS terminated upstream at Traefik — tell Synapse the real scheme/host.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- client sync / read-heavy endpoints -> sync workers ---
    location ~ ^/_matrix/client/(r0|v3|unstable)/sync$                  { proxy_pass http://synapse_sync; }
    location ~ ^/_matrix/client/(api/v1|r0|v3)/events$                 { proxy_pass http://synapse_sync; }
    location ~ ^/_matrix/client/(api/v1|r0|v3)/initialSync$            { proxy_pass http://synapse_sync; }
    location ~ ^/_matrix/client/(api/v1|r0|v3)/rooms/[^/]+/initialSync { proxy_pass http://synapse_sync; }
    location ~ ^/_matrix/client/(r0|v3|unstable)/rooms/[^/]+/messages$ { proxy_pass http://synapse_sync; }
    location ~ ^/_matrix/client/(r0|v3)/keys/(query|changes)$          { proxy_pass http://synapse_sync; }

    # --- inbound federation -> federation reader ---
    location ~ ^/_matrix/federation/ { proxy_pass http://synapse_fed; }
    location ~ ^/_matrix/key/        { proxy_pass http://synapse_fed; }

    # --- media -> media worker ---
    location ~ ^/_matrix/media/           { proxy_pass http://synapse_media; }
    location ~ ^/_matrix/client/v1/media/ { proxy_pass http://synapse_media; }
    location ~ ^/_synapse/admin/v1/(purge_media_cache|room/[^/]+/media|user/[^/]+/media|media/) { proxy_pass http://synapse_media; }

    # --- everything else -> main ---
    location / { proxy_pass http://synapse_main; }
}
